<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#1a2a3a"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </radialGradient>
  </defs>
  <rect width="160" height="160" fill="url(#bg2)"/>
  <!-- Shoulders -->
  <ellipse cx="80" cy="175" rx="70" ry="45" fill="#111820"/>
  <!-- Dark jacket -->
  <path d="M 10 175 Q 30 140 55 130 L 80 145 L 105 130 Q 130 140 150 175 Z" fill="#1a2233"/>
  <!-- Shirt -->
  <polygon points="80,145 68,132 80,152 92,132" fill="#2a3a55"/>

  <!-- Neck -->
  <rect x="69" y="100" width="22" height="35" fill="#d4956a" rx="3"/>

  <!-- Head -->
  <ellipse cx="80" cy="82" rx="36" ry="40" fill="#d4956a"/>

  <!-- Black straight hair -->
  <rect x="44" y="45" width="72" height="25" fill="#111" rx="4"/>
  <ellipse cx="80" cy="48" rx="38" ry="18" fill="#0a0a0a"/>
  <!-- Side hair -->
  <rect x="44" y="48" width="12" height="30" fill="#111"/>
  <rect x="104" y="48" width="12" height="30" fill="#111"/>

  <!-- Ears -->
  <ellipse cx="46" cy="84" rx="7" ry="9" fill="#d4956a"/>
  <ellipse cx="114" cy="84" rx="7" ry="9" fill="#d4956a"/>

  <!-- Eyes (slightly narrower - Asian features) -->
  <path d="M 60 80 Q 67 76 74 80 Q 67 84 60 80 Z" fill="#fff"/>
  <path d="M 86 80 Q 93 76 100 80 Q 93 84 86 80 Z" fill="#fff"/>
  <ellipse cx="67" cy="80" rx="3.5" ry="3" fill="#1a0a0a"/>
  <ellipse cx="93" cy="80" rx="3.5" ry="3" fill="#1a0a0a"/>
  <circle cx="68.5" cy="79" r="1.2" fill="#fff"/>
  <circle cx="94.5" cy="79" r="1.2" fill="#fff"/>
  <!-- Upper eyelid line -->
  <path d="M 60 78 Q 67 75 74 78" fill="none" stroke="#222" stroke-width="1.5"/>
  <path d="M 86 78 Q 93 75 100 78" fill="none" stroke="#222" stroke-width="1.5"/>

  <!-- Eyebrows -->
  <rect x="60" y="70" width="15" height="2.5" rx="1" fill="#111"/>
  <rect x="85" y="70" width="15" height="2.5" rx="1" fill="#111"/>

  <!-- Nose -->
  <path d="M 80 88 Q 76 95 78 97 Q 80 98 82 97 Q 84 95 80 88" fill="#c08060" opacity="0.5"/>

  <!-- Neutral expression -->
  <path d="M 71 104 Q 80 109 89 104" fill="none" stroke="#a06040" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Glasses -->
  <rect x="58" y="76" width="16" height="10" rx="3" fill="none" stroke="#444" stroke-width="1.5"/>
  <rect x="86" y="76" width="16" height="10" rx="3" fill="none" stroke="#444" stroke-width="1.5"/>
  <line x1="74" y1="80" x2="86" y2="80" stroke="#444" stroke-width="1.5"/>
  <line x1="44" y1="80" x2="58" y2="80" stroke="#444" stroke-width="1.5"/>
  <line x1="102" y1="80" x2="114" y2="80" stroke="#444" stroke-width="1.5"/>
</svg>
