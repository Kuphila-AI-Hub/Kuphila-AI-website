<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#2d5a7b"/>
      <stop offset="100%" style="stop-color:#0a2535"/>
    </radialGradient>
  </defs>
  <rect width="160" height="160" fill="url(#bg1)"/>
  <!-- Shoulders -->
  <ellipse cx="80" cy="175" rx="70" ry="45" fill="#1a3d55"/>
  <!-- Blazer/jacket -->
  <path d="M 10 175 Q 30 140 55 130 L 80 145 L 105 130 Q 130 140 150 175 Z" fill="#2a5a78"/>
  <!-- Shirt/blouse -->
  <polygon points="80,145 65,130 80,155 95,130" fill="#e8f0f5"/>

  <!-- Neck -->
  <rect x="69" y="100" width="22" height="35" fill="#8b5a3a" rx="3"/>

  <!-- Head -->
  <ellipse cx="80" cy="82" rx="38" ry="42" fill="#8b5a3a"/>

  <!-- Natural curly hair -->
  <ellipse cx="80" cy="52" rx="42" ry="30" fill="#1a0a05"/>
  <ellipse cx="80" cy="65" rx="44" ry="20" fill="#1a0a05"/>
  <!-- Hair curls on sides -->
  <ellipse cx="45" cy="70" rx="16" ry="22" fill="#1a0a05"/>
  <ellipse cx="115" cy="70" rx="16" ry="22" fill="#1a0a05"/>
  <!-- More hair volume on top -->
  <circle cx="60" cy="48" r="15" fill="#2a1008"/>
  <circle cx="80" cy="42" r="16" fill="#221005"/>
  <circle cx="100" cy="48" r="15" fill="#2a1008"/>

  <!-- Ears -->
  <ellipse cx="44" cy="86" rx="7" ry="9" fill="#8b5a3a"/>
  <ellipse cx="116" cy="86" rx="7" ry="9" fill="#8b5a3a"/>

  <!-- Eyes -->
  <ellipse cx="67" cy="80" rx="7" ry="5" fill="#fff"/>
  <ellipse cx="93" cy="80" rx="7" ry="5" fill="#fff"/>
  <circle cx="67" cy="80" r="3.5" fill="#2a1a0a"/>
  <circle cx="93" cy="80" r="3.5" fill="#2a1a0a"/>
  <circle cx="68.5" cy="79" r="1.5" fill="#fff"/>
  <circle cx="94.5" cy="79" r="1.5" fill="#fff"/>

  <!-- Eyebrows -->
  <path d="M 60 72 Q 67 68 74 71" fill="none" stroke="#1a0a05" stroke-width="2" stroke-linecap="round"/>
  <path d="M 86 71 Q 93 68 100 72" fill="none" stroke="#1a0a05" stroke-width="2" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="80" cy="92" rx="5" ry="4" fill="#7a4a2a" opacity="0.5"/>

  <!-- Smile -->
  <path d="M 70 103 Q 80 112 90 103" fill="none" stroke="#6a3a1a" stroke-width="2" stroke-linecap="round"/>

  <!-- Earrings -->
  <circle cx="44" cy="93" r="3" fill="#f0c040"/>
  <circle cx="116" cy="93" r="3" fill="#f0c040"/>
</svg>
