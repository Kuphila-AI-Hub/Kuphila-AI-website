<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <defs>
    <radialGradient id="cellBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0515"/>
    </radialGradient>
    <radialGradient id="largeCellGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ff88cc;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#cc44aa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#882288;stop-opacity:0.9"/>
    </radialGradient>
    <radialGradient id="nucleusGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#ff44aa"/>
      <stop offset="100%" style="stop-color:#880033"/>
    </radialGradient>
    <radialGradient id="smallCell1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#cc88ff"/>
      <stop offset="100%" style="stop-color:#7722cc"/>
    </radialGradient>
    <radialGradient id="smallCell2" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffcc44"/>
      <stop offset="100%" style="stop-color:#cc8800"/>
    </radialGradient>
    <filter id="cellGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="500" height="380" fill="url(#cellBg)" rx="10"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#8888ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="500" y2="40"/>
    <line x1="0" y1="80" x2="500" y2="80"/>
    <line x1="0" y1="120" x2="500" y2="120"/>
    <line x1="0" y1="160" x2="500" y2="160"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="240" x2="500" y2="240"/>
    <line x1="0" y1="280" x2="500" y2="280"/>
    <line x1="0" y1="320" x2="500" y2="320"/>
    <line x1="0" y1="360" x2="500" y2="360"/>
    <line x1="50" y1="0" x2="50" y2="380"/>
    <line x1="100" y1="0" x2="100" y2="380"/>
    <line x1="150" y1="0" x2="150" y2="380"/>
    <line x1="200" y1="0" x2="200" y2="380"/>
    <line x1="250" y1="0" x2="250" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/>
    <line x1="350" y1="0" x2="350" y2="380"/>
    <line x1="400" y1="0" x2="400" y2="380"/>
    <line x1="450" y1="0" x2="450" y2="380"/>
  </g>

  <!-- Background small cells -->
  <ellipse cx="60" cy="80" rx="22" ry="18" fill="#3a1a55" opacity="0.7"/>
  <ellipse cx="64" cy="78" rx="10" ry="8" fill="#6a2a88" opacity="0.8"/>

  <ellipse cx="420" cy="60" rx="18" ry="20" fill="#2a1a40" opacity="0.7"/>
  <ellipse cx="422" cy="58" rx="8" ry="9" fill="#5a2a77" opacity="0.8"/>

  <ellipse cx="450" cy="310" rx="25" ry="20" fill="#2a0a35" opacity="0.6"/>
  <ellipse cx="453" cy="308" rx="11" ry="9" fill="#5a1a66" opacity="0.7"/>

  <ellipse cx="70" cy="300" rx="20" ry="22" fill="#331244" opacity="0.7"/>
  <ellipse cx="72" cy="298" rx="9" ry="10" fill="#5a2a77" opacity="0.8"/>

  <!-- Medium cells scattered -->
  <!-- Pale/lavender cell top right area -->
  <ellipse cx="360" cy="120" rx="38" ry="42" fill="none" stroke="#bb99dd" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="360" cy="120" rx="34" ry="38" fill="#2a1a3a" opacity="0.6"/>
  <ellipse cx="358" cy="118" rx="15" ry="17" fill="url(#smallCell1)" opacity="0.75"/>
  <ellipse cx="355" cy="115" rx="6" ry="7" fill="#cc99ff" opacity="0.9"/>

  <!-- Yellow/orange cell -->
  <ellipse cx="130" cy="270" rx="32" ry="30" fill="none" stroke="#ddaa44" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="130" cy="270" rx="28" ry="26" fill="#1a1205" opacity="0.7"/>
  <ellipse cx="128" cy="268" rx="13" ry="12" fill="url(#smallCell2)" opacity="0.8"/>
  <ellipse cx="126" cy="266" rx="5" ry="5" fill="#ffee88" opacity="0.9"/>

  <!-- Small cells -->
  <circle cx="200" cy="60" r="14" fill="#1a0a2a" stroke="#9966cc" stroke-width="1" opacity="0.7"/>
  <circle cx="201" cy="59" r="6" fill="#8844bb" opacity="0.8"/>

  <circle cx="310" cy="320" r="12" fill="#1a0a22" stroke="#8855cc" stroke-width="1" opacity="0.6"/>
  <circle cx="311" cy="319" r="5" fill="#7733aa" opacity="0.8"/>

  <circle cx="170" cy="150" r="10" fill="#180818" stroke="#cc6699" stroke-width="1" opacity="0.6"/>
  <circle cx="171" cy="149" r="4" fill="#aa4488" opacity="0.7"/>

  <!-- LARGE MAIN CELL - center-left, pink/magenta (like cervical cell) -->
  <ellipse cx="235" cy="210" rx="85" ry="90" fill="none" stroke="#ff99dd" stroke-width="2" opacity="0.6" filter="url(#cellGlow)"/>
  <ellipse cx="235" cy="210" rx="80" ry="85" fill="#330828" opacity="0.6"/>
  <ellipse cx="232" cy="207" rx="72" ry="77" fill="url(#largeCellGrad)" opacity="0.55"/>

  <!-- Cell membrane texture -->
  <ellipse cx="235" cy="210" rx="80" ry="85" fill="none" stroke="#ee77cc" stroke-width="1" stroke-dasharray="4,6" opacity="0.4"/>

  <!-- Large nucleus -->
  <ellipse cx="228" cy="202" rx="38" ry="42" fill="url(#nucleusGrad)" opacity="0.9" filter="url(#softGlow)"/>
  <!-- Nucleus membrane -->
  <ellipse cx="228" cy="202" rx="38" ry="42" fill="none" stroke="#ff66bb" stroke-width="1.5" opacity="0.7"/>
  <!-- Nucleolus -->
  <ellipse cx="222" cy="196" rx="16" ry="18" fill="#ff2288" opacity="0.8"/>
  <ellipse cx="219" cy="193" rx="7" ry="8" fill="#ff88cc" opacity="0.9"/>
  <!-- Second nucleolus -->
  <ellipse cx="238" cy="215" rx="10" ry="11" fill="#dd1166" opacity="0.7"/>

  <!-- Chromatin dots in nucleus -->
  <circle cx="215" cy="208" r="3" fill="#ff44aa" opacity="0.6"/>
  <circle cx="240" cy="200" r="2.5" fill="#ff66bb" opacity="0.6"/>
  <circle cx="230" cy="220" r="2" fill="#ff44aa" opacity="0.5"/>

  <!-- Cell cytoplasm details -->
  <circle cx="270" cy="175" r="5" fill="#ff77bb" opacity="0.4"/>
  <circle cx="285" cy="200" r="4" fill="#ee66aa" opacity="0.35"/>
  <circle cx="260" cy="245" r="6" fill="#dd5599" opacity="0.3"/>
  <circle cx="200" cy="250" r="4" fill="#ff77bb" opacity="0.35"/>
  <circle cx="195" cy="175" r="5" fill="#ee66aa" opacity="0.3"/>

  <!-- AI Detection overlay - bounding box -->
  <rect x="152" y="118" width="170" height="185" fill="none" stroke="#00ff88" stroke-width="2" stroke-dasharray="8,4" opacity="0.8" rx="4" filter="url(#softGlow)"/>

  <!-- Corner markers -->
  <path d="M 152 128 L 152 118 L 162 118" fill="none" stroke="#00ff88" stroke-width="3" stroke-linecap="round"/>
  <path d="M 312 118 L 322 118 L 322 128" fill="none" stroke="#00ff88" stroke-width="3" stroke-linecap="round"/>
  <path d="M 152 293 L 152 303 L 162 303" fill="none" stroke="#00ff88" stroke-width="3" stroke-linecap="round"/>
  <path d="M 312 303 L 322 303 L 322 293" fill="none" stroke="#00ff88" stroke-width="3" stroke-linecap="round"/>

  <!-- Detection label -->
  <rect x="152" y="100" width="140" height="22" rx="4" fill="#00cc66" opacity="0.9"/>
  <text x="222" y="115" text-anchor="middle" fill="#fff" font-size="11" font-family="monospace" font-weight="bold">ABNORMAL CELL 98.7%</text>

  <!-- Second cell with partial overlap -->
  <ellipse cx="360" cy="240" rx="55" ry="58" fill="none" stroke="#bb88cc" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="360" cy="240" rx="50" ry="53" fill="#200a30" opacity="0.7"/>
  <ellipse cx="357" cy="237" rx="43" ry="46" fill="#6622aa" opacity="0.35"/>
  <!-- This cell nucleus -->
  <ellipse cx="355" cy="233" rx="22" ry="24" fill="#9933cc" opacity="0.75"/>
  <ellipse cx="352" cy="230" rx="9" ry="10" fill="#cc77ff" opacity="0.85"/>

  <!-- Normal cell label -->
  <rect x="338" y="175" width="80" height="18" rx="3" fill="#0088ff" opacity="0.85"/>
  <text x="378" y="188" text-anchor="middle" fill="#fff" font-size="9" font-family="monospace">NORMAL 99.1%</text>

  <!-- Scanning line effect -->
  <line x1="0" y1="190" x2="500" y2="190" stroke="#00ffcc" stroke-width="1" opacity="0.15"/>

  <!-- Corner UI elements -->
  <text x="15" y="20" fill="#00aaff" font-size="9" font-family="monospace" opacity="0.7">KUPHILA AI v2.4.1</text>
  <text x="15" y="35" fill="#0088aa" font-size="8" font-family="monospace" opacity="0.6">PAP SMEAR ANALYSIS</text>

  <text x="390" y="20" fill="#00ff88" font-size="9" font-family="monospace" opacity="0.7" text-anchor="end">SCAN: 00247</text>
  <text x="490" y="35" fill="#00aa66" font-size="8" font-family="monospace" opacity="0.6" text-anchor="end">STATUS: ACTIVE</text>

  <!-- Bottom stats -->
  <rect x="0" y="358" width="500" height="22" fill="#0a0a1a" opacity="0.8"/>
  <text x="20" y="373" fill="#00aaff" font-size="8" font-family="monospace">CELLS DETECTED: 6</text>
  <text x="160" y="373" fill="#ffaa00" font-size="8" font-family="monospace">ABNORMAL: 1</text>
  <text x="270" y="373" fill="#00ff88" font-size="8" font-family="monospace">NORMAL: 5</text>
  <text x="380" y="373" fill="#aaaaff" font-size="8" font-family="monospace">CONF: 98.7%</text>
</svg>
