<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#1a2a1a"/>
      <stop offset="100%" style="stop-color:#0a150a"/>
    </radialGradient>
  </defs>
  <rect width="160" height="160" fill="url(#bg4)"/>
  <!-- Suit -->
  <ellipse cx="80" cy="175" rx="70" ry="45" fill="#111a11"/>
  <path d="M 10 175 Q 30 140 55 130 L 80 145 L 105 130 Q 130 140 150 175 Z" fill="#1a2e1a"/>
  <!-- White shirt, tie -->
  <polygon points="80,145 68,132 80,152 92,132" fill="#eef2ee"/>
  <polygon points="80,135 77,145 80,152 83,145" fill="#1a4a8a"/>

  <!-- Neck -->
  <rect x="69" y="100" width="22" height="35" fill="#7a4a28" rx="3"/>

  <!-- Head -->
  <ellipse cx="80" cy="82" rx="37" ry="41" fill="#7a4a28"/>

  <!-- Short fade haircut -->
  <ellipse cx="80" cy="52" rx="38" ry="20" fill="#111"/>
  <rect x="42" y="52" width="76" height="16" fill="#111"/>
  <!-- Very close-cut fade sides -->
  <ellipse cx="46" cy="68" rx="10" ry="14" fill="#1a1008" opacity="0.7"/>
  <ellipse cx="114" cy="68" rx="10" ry="14" fill="#1a1008" opacity="0.7"/>
  <!-- Top hair slightly visible -->
  <ellipse cx="80" cy="48" rx="34" ry="12" fill="#151005"/>

  <!-- Ears -->
  <ellipse cx="45" cy="84" rx="7" ry="9" fill="#7a4a28"/>
  <ellipse cx="115" cy="84" rx="7" ry="9" fill="#7a4a28"/>

  <!-- Eyes -->
  <ellipse cx="67" cy="80" rx="7" ry="5" fill="#fff"/>
  <ellipse cx="93" cy="80" rx="7" ry="5" fill="#fff"/>
  <circle cx="67" cy="80" r="3.5" fill="#1a0a05"/>
  <circle cx="93" cy="80" r="3.5" fill="#1a0a05"/>
  <circle cx="68.5" cy="79" r="1.5" fill="#fff"/>
  <circle cx="94.5" cy="79" r="1.5" fill="#fff"/>

  <!-- Eyebrows - strong -->
  <rect x="60" y="71" width="15" height="3" rx="1.5" fill="#111" transform="rotate(-3,67.5,72.5)"/>
  <rect x="85" y="71" width="15" height="3" rx="1.5" fill="#111" transform="rotate(3,92.5,72.5)"/>

  <!-- Nose - broader -->
  <path d="M 80 88 Q 74 96 74 98 Q 78 101 80 100 Q 82 101 86 98 Q 86 96 80 88" fill="#6a3a18" opacity="0.55"/>

  <!-- Confident smile -->
  <path d="M 69 104 Q 80 115 91 104" fill="none" stroke="#5a2a10" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Teeth hint -->
  <path d="M 70 105 Q 80 113 90 105" fill="#fff" opacity="0.3"/>

  <!-- Jaw/beard stubble hint -->
  <ellipse cx="80" cy="112" rx="25" ry="8" fill="#5a3015" opacity="0.15"/>
</svg>
