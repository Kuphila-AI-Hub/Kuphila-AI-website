<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#2a1a35"/>
      <stop offset="100%" style="stop-color:#120a1a"/>
    </radialGradient>
  </defs>
  <rect width="160" height="160" fill="url(#bg3)"/>
  <!-- Shoulders/blazer -->
  <ellipse cx="80" cy="175" rx="70" ry="45" fill="#22103a"/>
  <path d="M 10 175 Q 30 140 55 130 L 80 145 L 105 130 Q 130 140 150 175 Z" fill="#3a1a55"/>
  <!-- Inner shirt -->
  <polygon points="80,145 67,132 80,155 93,132" fill="#cc88ff" opacity="0.8"/>

  <!-- Neck -->
  <rect x="69" y="100" width="22" height="35" fill="#5a3020" rx="3"/>

  <!-- Head -->
  <ellipse cx="80" cy="82" rx="37" ry="41" fill="#5a3020"/>

  <!-- Short natural hair -->
  <ellipse cx="80" cy="55" rx="40" ry="22" fill="#110808"/>
  <ellipse cx="80" cy="62" rx="42" ry="18" fill="#110808"/>
  <!-- Tight curls on sides and top -->
  <circle cx="50" cy="65" r="13" fill="#180a0a"/>
  <circle cx="80" cy="45" r="15" fill="#180a0a"/>
  <circle cx="110" cy="65" r="13" fill="#180a0a"/>
  <circle cx="60" cy="55" r="11" fill="#110808"/>
  <circle cx="100" cy="55" r="11" fill="#110808"/>

  <!-- Ears -->
  <ellipse cx="45" cy="84" rx="7" ry="9" fill="#5a3020"/>
  <ellipse cx="115" cy="84" rx="7" ry="9" fill="#5a3020"/>

  <!-- Eyes -->
  <ellipse cx="67" cy="80" rx="7" ry="5" fill="#fff"/>
  <ellipse cx="93" cy="80" rx="7" ry="5" fill="#fff"/>
  <circle cx="67" cy="80" r="3.5" fill="#1a0808"/>
  <circle cx="93" cy="80" r="3.5" fill="#1a0808"/>
  <circle cx="68.5" cy="79" r="1.5" fill="#fff"/>
  <circle cx="94.5" cy="79" r="1.5" fill="#fff"/>

  <!-- Eyebrows - arched -->
  <path d="M 60 72 Q 67 67 74 71" fill="none" stroke="#110808" stroke-width="2" stroke-linecap="round"/>
  <path d="M 86 71 Q 93 67 100 72" fill="none" stroke="#110808" stroke-width="2" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="80" cy="92" rx="6" ry="5" fill="#4a2010" opacity="0.5"/>

  <!-- Warm smile -->
  <path d="M 68 103 Q 80 114 92 103" fill="none" stroke="#3a1a08" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Earrings - small hoops -->
  <circle cx="45" cy="92" r="4" fill="none" stroke="#ddaa44" stroke-width="1.5"/>
  <circle cx="115" cy="92" r="4" fill="none" stroke="#ddaa44" stroke-width="1.5"/>
</svg>
